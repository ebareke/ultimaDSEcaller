name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin ultimaDSEcaller
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          name="ultimaDSEcaller-${GITHUB_REF_NAME}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/ultimaDSEcaller" "dist/${name}/"
          cp README.md "dist/${name}/"
          cp Cargo.toml "dist/${name}/"
          (cd dist && tar czf "${name}.tar.gz" "${name}")
      - uses: actions/upload-artifact@v4
        with:
          name: ultimaDSEcaller-${{ matrix.target }}
          path: dist/*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -name '*.tar.gz' -exec cp {} release/ \;
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        env:
          TAG: ${{ github.ref_name }}
        run: docker build -t "ultimadsecaller:${TAG}" .
